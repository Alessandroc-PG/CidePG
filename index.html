<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Relatório Power BI</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="container"></div>

    <script>
        // --- COLE SEUS LINKS PÚBLICOS AQUI ---
        const linkDesktop = "https://app.powerbi.com/view?r=eyJrIjoiNTk4MWE1NDEtZjMxZi00Y2ZiLTg1MzEtZmRjNmVmZGU4YjM2IiwidCI6ImJkOTFhMDZhLTAzMGMtNDBiNC1hMWUzLTE5Y2Y4ODE0Zjk2MCJ9";
        const linkMobile = "https://app.powerbi.com/view?r=eyJrIjoiMDc4MTg1MmMtODljNi00Zjc2LThmYzgtYTdiNzU3MWJiMGYwIiwidCI6ImJkOTFhMDZhLTAzMGMtNDBiNC1hMWUzLTE5Y2Y4ODE0Zjk2MCJ9";

        function carregarRelatorio() {
            const container = document.getElementById('container');
            const larguraTela = window.innerWidth;
            let urlFinal = "";

            // Se a tela for menor que 768px, carrega o mobile
            if (larguraTela < 768) {
                urlFinal = linkMobile;
            } else {
                urlFinal = linkDesktop;
            }

            container.innerHTML = `<iframe src="${urlFinal}" allowFullScreen="true"></iframe>`;
        }

        // Executa ao carregar a página
        carregarRelatorio();

        // Opcional: Recarregar se o usuário girar o celular ou redimensionar a tela
        window.onresize = function() {
            location.reload();
        };
    </script>
</body>
</html>
